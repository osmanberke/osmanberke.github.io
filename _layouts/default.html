<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }} – {% endif %}Osman Berke Guney</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>
  <nav>
    <div class="inner">
      <a href="{{ '/' | relative_url }}" class="nav-brand">Osman Berke Guney</a>
      <ul class="nav-links">
        <li><a href="{{ '/publications.html' | relative_url }}"{% if page.url == '/publications.html' %} class="active"{% endif %}>Publications</a></li>
        <li><a href="{{ '/blog/' | relative_url }}"{% if page.url contains '/blog' %} class="active"{% endif %}>Blog</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    {{ content }}
  </main>

  <footer>
    &copy; {{ 'now' | date: "%Y" }} Osman Berke Guney
  </footer>
</body>
</html>
